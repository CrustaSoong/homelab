---
name: "Verify Target Namespace"

on:
  push:
    branches:
      - '*'

jobs:
  verify-target-namespace:
    name: Verify Target Namespace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Verify Target Namespace
        shell: bash
        run: |
          set -euo pipefail

          failure=0

          shopt -s nullglob
          for dirPath in ./kubernetes/apps/*; do
            dir="$(basename "${dirPath}")"

            namespaceFile="./kubernetes/apps/${dir}/namespace.yaml"
            if [ ! -f "${namespaceFile}" ]; then
              echo "❌ Namespace file '${namespaceFile}' does not exist"
              failure=1
              continue
            fi

            namespace="$(yq .metadata.name "${namespaceFile}")"
            patch="$(yq '.patches.[].patch' "./kubernetes/apps/${dir}/kustomization.yaml")"
            patch="$(echo "${patch}" | sed 's/\s\+//g')"

            expectedPatch="- op: add path: /spec/targetNamespace value: ${namespace}"
            if [ "${patch}" != "${expectedPatch}" ]; then
              echo "❌ Patch '${patch}' in '${namespaceFile}' does not match expected '${expectedPatch}'"
              failure=1
            fi

            if [ "${namespace}" != "${dir}" ]; then
              echo "❌ Namespace '${namespace}' does not match directory '${dir}'"
              failure=1
            fi

            ksfiles=(./kubernetes/apps/${dir}/*/ks.yaml)
            for ks in "${ksfiles[@]}"; do
              found="$(yq '.spec.targetNamespace | select(. != null and . != "")' "${ks}")"
              if [ -n "${found}" ]; then
                echo "❌ Do not specify targetNamespace in '${ks}'"
                failure=1
              fi
            done

            while IFS= read -r -d '' file; do
              found="$(yq 'select((.metadata.namespace != null and .metadata.namespace != "") and (.kind != "Kustomization" and .metadata.namespace != "flux-system")).metadata.namespace' "${file}")"
              if [ -n "${found}" ]; then
                # yq may emit document separators when multiple docs exist; filter those out.
                while IFS= read -r line; do
                  [ "${line}" = "---" ] && continue
                  echo "❌ Found '${line}' in '${file}'"
                  failure=1
                done <<<"${found}"
              fi
            done < <(find "./kubernetes/apps/${dir}" -type f -name "*.yaml" -print0)
          done

          exit ${failure}
